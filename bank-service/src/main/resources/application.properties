spring.application.name=bank-service
server.port=8081

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/bigbankdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=pg
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Show SQL queries in console (great for learning)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
management.endpoints.web.exposure.include=*

#application properties
bank.name=Big Bank

# JWT (use a long random secret in production; HS256 needs >= 256 bits — this string is long enough for dev)
app.jwt.secret=dev-only-change-me-use-64-plus-chars-abcdefghijklmnopqrstuvwxyz0123456789
app.jwt.expiration-ms=86400000