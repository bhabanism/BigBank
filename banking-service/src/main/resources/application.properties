spring.application.name=banking-service
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/bigbankdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=pg
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

management.endpoints.web.exposure.include=*

app.jwt.secret=dev-only-change-me-use-64-plus-chars-abcdefghijklmnopqrstuvwxyz0123456789
